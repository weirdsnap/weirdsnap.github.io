<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog List</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/list.css">
    <script src="../scripts/vendor/vue.global.js"></script>
</head>
<body>
    <div id="header" class="opacity70">
        <button class="mobile-menu-btn" @click="toggleMenu">☰</button>
        <ul class="title" :class="{ 'mobile-open': menuOpen }">
            <li @click="home">Snap</li>
            <li @click="list">Blogs</li>
            <li @click="hollowKnight">空洞骑士</li>
            <li @click="github">Github</li>
        </ul>
    </div>
    <div id="contents" class="opacity90">
        <div id="blogs">
            <nav class="breadcrumb" v-if="breadcrumb.length">
                <span v-for="(crumb, idx) in breadcrumb" :key="idx">
                    <a v-if="crumb.link" :href="crumb.link">{{ crumb.label }}</a>
                    <span v-else class="current">{{ crumb.label }}</span>
                    <span v-if="idx < breadcrumb.length - 1" class="sep">/</span>
                </span>
            </nav>

            <h1 class="page-title">{{ pageTitle }}</h1>

            <!-- 子分类列表（folder 模式） -->
            <div v-if="showSubs" class="sub-grid">
                <div v-for="sub in subs" :key="sub.id" class="sub-category-card" @click="goSub(sub)">
                    <h3>{{ sub.label }}</h3>
                    <p>{{ sub.articles.length }} 篇</p>
                </div>
            </div>

            <!-- 文章列表 -->
            <div v-if="showArticles" class="article-grid">
                <div v-for="article in articles" :key="article.path" class="article-card" @click="goArticle(article)">
                    <h3 class="article-title">{{ article.title }}</h3>
                    <span class="article-meta" v-if="article.readTime">预计阅读 {{ article.readTime }} 分钟</span>
                </div>
            </div>

            <p v-if="!showSubs && !showArticles" class="empty">暂无内容</p>
        </div>
    </div>
    <div id="bottom" class="opacity70">
        <span>2018-2026</span>
    </div>
    <script src="../scripts/list.js"></script>
</body>
</html>
