<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog List</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/list.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="header" class="opacity70">
        <ul class="title">
            <li>Snap</li>
            <li v-on:click="github">Github</li>
        </ul>
    </div>
    <div id="contents" class="opacity90" style="padding:1em;">
        <div id="blogs">
            <h1 style="text-align:center;font-size:2em;margin:0.5em 0;">{{ pageTitle }}</h1>
            <!-- 子分类列表（folder 模式） -->
            <div v-if="showSubs">
                <div v-for="sub in subs" :key="sub.id" class="sub-category-card" @click="goSub(sub)">
                    <h3>{{ sub.label }}</h3>
                    <p>{{ sub.articles.length }} 篇</p>
                </div>
            </div>
            <!-- 文章列表 -->
            <ul v-if="showArticles" class="article-list">
                <li v-for="article in articles" :key="article.path" class="opacity90" @click="goArticle(article)">
                    {{ article.title }}
                </li>
            </ul>
        </div>
    </div>
    <div id="bottom" class="opacity70">
        <span>2018-2026</span>
    </div>
    <script src="../scripts/list.js"></script>
</body>
</html>
