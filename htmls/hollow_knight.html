<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助手</title>
    <link rel="stylesheet" href="../css/style.css?v=2">
    <script src="../scripts/vendor/vue.global.js"></script>
    <script src="../scripts/vendor/marked.min.js"></script>
    <style>
        /* 与博客统一的页面内容区 */
        #contents {
            flex: 1;
            overflow: auto;
            background-color: rgba(249, 245, 235, 0.92);
            backdrop-filter: blur(2px);
        }

        .hk-container {
            max-width: var(--article-max-width);
            margin: 0 auto;
            padding: 2em 1.5em 4em;
            min-height: calc(100vh - var(--header-height) - var(--footer-height));
        }

        /* 通用卡片样式，与博客文章卡片一致 */
        .hk-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2em;
        }

        /* 密码页 */
        .password-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        .password-box {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .password-box h2 {
            margin: 0 0 0.5em;
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .password-box p {
            color: var(--text-secondary);
            margin: 0 0 1.5em;
            font-size: 0.95rem;
        }
        .password-box input {
            width: 100%;
            padding: 0.75em 1em;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: var(--font-sans);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            background: var(--bg-warm);
        }
        .password-box input:focus {
            border-color: var(--accent-warm);
            box-shadow: 0 0 0 3px rgba(193, 120, 23, 0.12);
        }
        .password-box .error-msg {
            color: #c0392b;
            font-size: 0.85rem;
            margin: 0.5em 0 0;
            min-height: 1.4em;
        }
        .password-box button {
            margin-top: 1.25em;
            padding: 0.65em 2em;
            background: var(--accent-warm);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .password-box button:hover {
            background: var(--accent-hover);
        }
        .password-box button:active {
            transform: translateY(1px);
        }

        /* 聊天界面 */
        .chat-area {
            display: none;
            flex-direction: column;
            height: calc(100vh - var(--header-height) - var(--footer-height) - 4em);
            min-height: 480px;
        }
        .chat-area.active {
            display: flex;
        }

        .chat-header {
            text-align: center;
            padding-bottom: 1em;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1em;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-primary);
        }
        .chat-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25em;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 0.75em 1em;
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            line-height: 1.65;
            word-break: break-word;
            box-shadow: var(--shadow-sm);
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent-warm);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--bg-warm);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: var(--radius-sm);
        }
        .message.assistant p {
            margin: 0.5em 0;
        }
        .message.assistant p:first-child {
            margin-top: 0;
        }
        .message.assistant p:last-child {
            margin-bottom: 0;
        }
        .message.assistant em {
            color: var(--accent-warm);
            font-style: normal;
        }
        .message.assistant strong {
            color: var(--accent-hover);
        }

        .message.loading .dots {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding-top: 1em;
            border-top: 1px solid var(--border-color);
            margin-top: 1em;
        }
        .chat-input-area input {
            flex: 1;
            padding: 0.75em 1em;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--bg-warm);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .chat-input-area input:focus {
            border-color: var(--accent-warm);
            box-shadow: 0 0 0 3px rgba(193, 120, 23, 0.12);
        }
        .chat-input-area input:disabled {
            opacity: 0.6;
        }
        .chat-input-area button {
            padding: 0.75em 1.5em;
            background: var(--accent-warm);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .chat-input-area button:hover {
            background: var(--accent-hover);
        }
        .chat-input-area button:active {
            transform: translateY(1px);
        }
        .chat-input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 示例问题 */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0.5em 0;
        }
        .suggestions button {
            padding: 0.4em 0.9em;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            background: var(--bg-warm);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .suggestions button:hover {
            background: var(--accent-light);
            color: var(--accent-hover);
            border-color: var(--accent-light);
        }

        /* 底部页脚 */
        .hk-footer {
            text-align: center;
            padding-top: 1em;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .hk-footer a {
            color: var(--accent-warm);
            text-decoration: none;
            transition: color 0.2s;
        }
        .hk-footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hk-container {
                padding: 1em 1em 2em;
            }
            .hk-card {
                padding: 1.25em;
            }
            .chat-area {
                height: calc(100vh - var(--header-height) - var(--footer-height) - 2em);
                min-height: 400px;
            }
            .message {
                max-width: 90%;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div id="header" class="opacity70">
        <button class="mobile-menu-btn" @click="toggleMenu">☰</button>
        <ul class="title" :class="{ 'mobile-open': menuOpen }">
            <li @click="home">Snap</li>
            <li @click="hollowKnight">助手</li>
            <li @click="github">Github</li>
        </ul>
    </div>

    <div id="contents">
        <div class="hk-container" id="app">
            <!-- 密码输入 -->
            <div class="password-overlay" v-if="!authenticated">
                <div class="password-box hk-card">
                    <h2>游戏助手</h2>
                    <p>输入密码以访问</p>
                    <input type="password" v-model="passwordInput" @keyup.enter="login" placeholder="请输入密码" ref="pwInput">
                    <div class="error-msg">{{ errorMsg }}</div>
                    <button @click="login" :disabled="loading">{{ loading ? '登录中...' : '确认' }}</button>
                </div>
            </div>

            <!-- 聊天界面 -->
            <div class="chat-area" :class="{ active: authenticated }">
                <div class="hk-card" style="display: flex; flex-direction: column; flex: 1;">
                    <div class="chat-header">
                        <h2>游戏助手</h2>
                        <div class="subtitle">基于 RAG 的知识库，可以问游戏中的任何内容</div>
                    </div>

                    <div class="chat-messages" ref="msgBox">
                        <div v-for="msg in messages" :key="msg.id" class="message" :class="msg.role">
                            <span v-if="msg.role === 'loading'" class="dots">思考中...</span>
                            <span v-else v-html="msg.content"></span>
                        </div>
                    </div>

                    <!-- 示例问题 -->
                    <div class="suggestions" v-if="messages.length <= 1">
                        <button v-for="q in sampleQuestions" :key="q" @click="sendQuestion(q)" :disabled="loading">{{ q }}</button>
                    </div>

                    <div class="chat-input-area">
                        <input type="text" v-model="questionInput" @keyup.enter="sendQuestion()" placeholder="输入你的问题..." :disabled="loading" ref="inputBox">
                        <button @click="sendQuestion()" :disabled="loading || !questionInput.trim()">
                            {{ loading ? '思考中...' : '发送' }}
                        </button>
                    </div>

                    <div class="hk-footer">
                        <a href="../index.html">← 返回首页</a> · 数据来源 Hollow Knight Wiki &amp; Hallownest API
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bottom" class="opacity70">
        <span>2018-2026</span>
    </div>

    <script>
        // Header
        Vue.createApp({
            data() {
                return { menuOpen: false }
            },
            methods: {
                home() { window.location.href = '../index.html'; },
                hollowKnight() {},
                github() { window.location.href = 'https://github.com/weirdsnap'; },
                toggleMenu() { this.menuOpen = !this.menuOpen; }
            }
        }).mount('#header');

        // Main App
        // 后端只支持 HTTPS，直接写死避免本地 HTTP 测试时协议降级
        const API_URL = 'https://api.weirdsnap.top:8443/api';

        const app = Vue.createApp({
            data() {
                return {
                    authenticated: false,
                    token: null,
                    tokenExpiry: null,
                    passwordInput: '',
                    errorMsg: '',
                    questionInput: '',
                    loading: false,
                    messages: [
                        {
                            id: 0,
                            role: 'assistant',
                            content: '你好！我是游戏助手<br>有什么关于圣巢的问题都可以问我！'
                        }
                    ],
                    msgId: 1,
                    sampleQuestions: [
                        '怎么获得螳螂爪？',
                        '深巢入口在哪里？',
                        '白王是谁？',
                        '梦之钉怎么升级？'
                    ]
                }
            },
            methods: {
                async login() {
                    if (this.loading) return;
                    this.errorMsg = '';
                    if (!this.passwordInput.trim()) {
                        this.errorMsg = '请输入密码';
                        return;
                    }
                    this.loading = true;
                    const ok = await this.doLogin();
                    this.loading = false;
                    if (!ok) return;
                    this.authenticated = true;
                    this.$nextTick(() => {
                        this.$refs.inputBox?.focus();
                    });
                },

                async doLogin() {
                    try {
                        const res = await fetch(API_URL + '/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: this.passwordInput.trim() })
                        });
                        const data = await res.json();
                        if (res.ok && data.token) {
                            this.token = data.token;
                            // 记录过期时间，预留 60 秒缓冲
                            const expiresIn = data.expires_in || 3600;
                            this.tokenExpiry = Date.now() + (expiresIn - 60) * 1000;
                            return true;
                        }
                        if (res.status === 401 || data.error === '密码错误') {
                            this.errorMsg = '密码错误';
                        } else {
                            this.errorMsg = data.error || '登录失败';
                        }
                        return false;
                    } catch (e) {
                        this.errorMsg = '无法连接到助手服务器';
                        return false;
                    }
                },

                isTokenExpired() {
                    return !this.token || (this.tokenExpiry && Date.now() > this.tokenExpiry);
                },

                async ensureToken() {
                    if (this.isTokenExpired()) {
                        // token 过期，重新登录
                        this.authenticated = false;
                        this.token = null;
                        this.errorMsg = '登录已过期，请重新输入密码';
                        return false;
                    }
                    return true;
                },

                async sendQuestion(q) {
                    if (this.loading) return;
                    const text = q || this.questionInput.trim();
                    if (!text) return;

                    if (q) {
                        this.questionInput = q;
                    } else {
                        this.questionInput = '';
                    }

                    this.messages.push({
                        id: this.msgId++,
                        role: 'user',
                        content: this.escapeHtml(text)
                    });

                    const assistantId = this.msgId++;
                    this.messages.push({
                        id: assistantId,
                        role: 'assistant',
                        content: '<p>思考中...</p>'
                    });

                    this.loading = true;
                    this.scrollBottom();

                    try {
                        // 构建历史，跳过第一条系统欢迎语
                        const history = [];
                        for (let i = 1; i < this.messages.length - 1; i++) {
                            const m = this.messages[i];
                            if (m.role === 'user') {
                                history.push({ role: 'user', content: this.stripHtml(m.content) });
                            } else if (m.role === 'assistant') {
                                history.push({ role: 'assistant', content: this.stripHtml(m.content) });
                            }
                        }

                        if (!(await this.ensureToken())) {
                            this.messages = this.messages.filter(m => m.id !== assistantId);
                            this.loading = false;
                            return;
                        }

                        const res = await fetch(API_URL + '/ask/stream', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token: this.token,
                                question: text,
                                history: history
                            })
                        });

                        if (!res.ok) {
                            const data = await res.json().catch(() => ({}));
                            this.messages = this.messages.filter(m => m.id !== assistantId);
                            this.messages.push({
                                id: this.msgId++,
                                role: 'assistant',
                                content: '<p>出错了：' + this.escapeHtml(data.error || '服务器错误 ' + res.status) + '</p>'
                            });
                            if (res.status === 401) {
                                this.authenticated = false;
                                this.token = null;
                                this.errorMsg = '登录已过期，请重新输入密码';
                            }
                            this.loading = false;
                            this.scrollBottom();
                            return;
                        }

                        // 消费 SSE 流
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';
                        let answerText = '';
                        let elapsed = 0;

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const parts = buffer.split('\n\n');
                            buffer = parts.pop(); // 保留未完整消息

                            for (const part of parts) {
                                for (const line of part.split('\n')) {
                                    if (!line.startsWith('data: ')) continue;
                                    const jsonStr = line.slice(6).trim();
                                    if (!jsonStr) continue;

                                    let data;
                                    try {
                                        data = JSON.parse(jsonStr);
                                    } catch (e) {
                                        console.error('SSE parse error:', jsonStr, e);
                                        continue;
                                    }

                                    switch (data.type) {
                                        case 'meta':
                                            // 可在此显示游戏信息，暂不处理
                                            break;
                                        case 'token':
                                            answerText += data.content;
                                            this.updateAssistantMessage(assistantId, answerText);
                                            break;
                                        case 'done':
                                            elapsed = data.elapsed || 0;
                                            break;
                                        case 'error':
                                            this.messages = this.messages.filter(m => m.id !== assistantId);
                                            this.messages.push({
                                                id: this.msgId++,
                                                role: 'assistant',
                                                content: '<p>出错了：' + this.escapeHtml(data.content || '未知错误') + '</p>'
                                            });
                                            this.loading = false;
                                            this.scrollBottom();
                                            return;
                                    }
                                }
                            }
                        }

                        if (answerText) {
                            this.updateAssistantMessage(assistantId, answerText, elapsed);
                        } else {
                            this.messages = this.messages.filter(m => m.id !== assistantId);
                            this.messages.push({
                                id: this.msgId++,
                                role: 'assistant',
                                content: '<p>没有收到回答</p>'
                            });
                        }
                    } catch (e) {
                        this.messages = this.messages.filter(m => m.id !== assistantId);
                        this.messages.push({
                            id: this.msgId++,
                            role: 'assistant',
                            content: '<p>网络错误，无法连接到助手服务器</p>'
                        });
                    }

                    this.loading = false;
                    this.scrollBottom();
                },

                updateAssistantMessage(id, text, elapsed) {
                    // 使用 marked 渲染 Markdown，单换行也转为 <br>
                    const html = marked.parse(text, { breaks: true });
                    const suffix = elapsed ? '<p class="elapsed">耗时 ' + Number(elapsed).toFixed(1) + ' 秒</p>' : '';
                    const idx = this.messages.findIndex(m => m.id === id);
                    if (idx !== -1) {
                        this.messages[idx].content = html + suffix;
                    }
                    this.scrollBottom();
                },

                scrollBottom() {
                    this.$nextTick(() => {
                        const box = this.$refs.msgBox;
                        if (box) box.scrollTop = box.scrollHeight;
                    });
                },

                escapeHtml(text) {
                    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                },

                stripHtml(html) {
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    return div.textContent || div.innerText || '';
                }
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
