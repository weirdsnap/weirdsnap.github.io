<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blog</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/blog.css">
    <!-- Vue 3 -->
    <script src="../scripts/vendor/vue.global.js"></script>
    <!-- Markdown renderer -->
    <script src="../scripts/vendor/marked.min.js"></script>
    <!-- Code highlight loaded on demand in blog.js -->
</head>
<body>
    <div id="header" class="opacity70">
        <button class="mobile-menu-btn" @click="toggleMenu">☰</button>
        <ul class="title" :class="{ 'mobile-open': menuOpen }">
            <li @click="home">Snap</li>
            <li @click="list">Blogs</li>
            <li @click="hollowKnight">助手</li>
            <li @click="github">Github</li>
        </ul>
    </div>
    <div id="contents" class="opacity90">
        <div id="blog-wrapper">
            <nav class="toc-sidebar" v-if="toc.length > 0 && !mobile">
                <div class="toc-title">目录</div>
                <ul>
                    <li v-for="item in toc" :key="item.id" :class="'toc-level-' + item.level">
                        <a :href="'#' + item.id" @click.prevent="scrollTo(item.id)">{{ item.text }}</a>
                    </li>
                </ul>
            </nav>
            <button class="toc-toggle" v-if="toc.length > 0 && mobile" @click="tocOpen = !tocOpen">
                目录
            </button>
            <div class="toc-overlay" v-if="toc.length > 0 && mobile" :class="{ open: tocOpen }" @click="tocOpen = false"></div>
            <nav class="toc-drawer" v-if="toc.length > 0 && mobile" :class="{ open: tocOpen }">
                <div class="toc-title">
                    目录
                    <button class="toc-close" @click="tocOpen = false">×</button>
                </div>
                <ul>
                    <li v-for="item in toc" :key="item.id" :class="'toc-level-' + item.level">
                        <a :href="'#' + item.id" @click.prevent="scrollTo(item.id)">{{ item.text }}</a>
                    </li>
                </ul>
            </nav>
            <div class="article-column">
                <a class="back-home" href="../index.html">← 返回首页</a>
                <article id="blog-post" v-html="renderedContent">
                    <p>Loading...</p>
                </article>
                <div class="article-meta-bar" v-if="meta">
                    <span>预计阅读 {{ meta.readTime }} 分钟</span>
                    <span>{{ meta.wordCount }} 字</span>
                    <span v-if="meta.date">{{ formatDate(meta.date) }}</span>
                    <span v-if="meta.updated && meta.updated !== meta.date" class="updated-tag">更新于 {{ formatDate(meta.updated) }}</span>
                </div>
                <nav class="article-nav" v-if="prev || next">
                    <a v-if="prev" class="nav-prev" :href="'./blog.html?post=' + encodeURIComponent(prev.path)">
                        <span class="nav-label">← 上一篇</span>
                        <span class="nav-title">{{ prev.title }}</span>
                    </a>
                    <span v-else class="nav-placeholder"></span>
                    <a v-if="next" class="nav-next" :href="'./blog.html?post=' + encodeURIComponent(next.path)">
                        <span class="nav-label">下一篇 →</span>
                        <span class="nav-title">{{ next.title }}</span>
                    </a>
                </nav>
            </div>
            <button class="back-to-top" :class="{ visible: showBackToTop }" @click="backToTop">↑</button>
        </div>
    </div>
    <div id="bottom" class="opacity70">
        <span>2018-2026</span>
    </div>
    <script src="../scripts/blog.js"></script>
</body>
</html>
