name: Blog CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate index.json
        run: python3 scripts/build_index.py

      - name: Check index.json is up to date
        run: |
          if [ -n "$(git status --porcelain posts/index.json)" ]; then
            echo "Error: posts/index.json is out of date. Run 'python3 scripts/build_index.py' and commit the result."
            exit 1
          fi

      - name: Validate JSON syntax
        run: python3 -c "import json; json.load(open('posts/index.json'))"
