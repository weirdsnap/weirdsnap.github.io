name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build index
        run: python3 scripts/build_index.py

      - name: Check index.json is up to date
        run: |
          if [ -n "$(git status --porcelain posts/index.json)" ]; then
            echo "Error: posts/index.json is out of date. Run 'python3 scripts/build_index.py' and commit the result."
            exit 1
          fi

      - name: Validate JSON syntax
        run: python3 -c "import json; json.load(open('posts/index.json'))"

      - name: Validate blog data
        run: python3 scripts/validate.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
