<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Snap Here</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
     
</head>
<body>
        <div id="header" class="opacity70">
            <ul class="title">
                <li v-on:click="home">Snap</li>
                <li v-on:click="github">Github</li>
            </ul>
        </div>
        <div id="contents" class="opacity50">
            <div id="categories">
                <p v-if="loading" style="color:#333;font-size:1.5em;">加载中...</p>
                <div v-for="cat in categories" :key="cat.id" class="category-card" @click="jumpCategory(cat)">
                    <h2>{{ cat.label }}</h2>
                    <p>{{ cat.articles.length + cat.subs.reduce((s,sub)=>s+sub.articles.length,0) }} 篇文章</p>
                </div>
            </div>
        </div>
        <div id="bottom" class="opacity70">
            <span>2018-2026</span>
        </div>
    <script src="scripts/index.js"></script>
</body>
</html>
