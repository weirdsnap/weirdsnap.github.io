<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Snap Here</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
     
</head>
<body>
        <div id="header" class="opacity70">
            <ul class="title">
                <li v-on:click="home">Snap</li>
                <li v-on:click="leetcode">LeetCode</li>
                <li v-on:click="github">Github</li>
            </ul>
        </div>
        <div id="contents" style="background-color: rgba(255,228,196,0.85);">
            <div id="categories">
                <p v-if="loading" style="color:#333;font-size:1.5em;">加载中...</p>
                <p v-if="error" style="color:#c00;font-size:1.2em;">{{ error }}</p>
                <div v-for="cat in categories" :key="cat.id" class="category-card" @click="jumpCategory(cat)">
                    <h2>{{ cat.label }}</h2>
                    <p>{{ articleCount(cat) }} 篇文章</p>
                </div>
            </div>
            <div id="debug" style="position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.8);color:#0f0;padding:10px;font-family:monospace;z-index:9999;"></div>
        </div>
        <div id="bottom" class="opacity70">
            <span>2018-2026</span>
        </div>
    <script src="scripts/index.js"></script>
</body>
</html>
